<!DOCTYPE html>
<html>

<head>
    <title>Healthcare Billing Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6">
            Healthcare Billing Prediction
        </h2>

        <form action="/predict" method="post" class="space-y-4">

            <div>
                <label class="block mb-1 font-medium">Age:</label>
                <input type="number" name="Age"
                    class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
            </div>

            <div>
                <label class="block mb-1 font-medium">Gender:</label>
                <select name="Gender"
                    class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div>
                <label class="block mb-1 font-medium">Blood Type:</label>
                <select name="Blood Type"
                    class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div>
                <label class="block mb-1 font-medium">Medical Condition:</label>
                <select name="Medical_Condition"
                    class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
                    <option value="Arthritis">Arthritis</option>
                    <option value="Asthma">Asthma</option>
                    <option value="Cancer">Cancer</option>
                    <option value="Diabetes">Diabetes</option>
                    <option value="Hypertension">Hypertension</option>
                    <option value="Obesity">Obesity</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
                Predict
            </button>
        </form>

        {% if prediction_text %}
        <div class="mt-6 text-center text-xl text-green-600 font-semibold">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>

</body>

</html>
